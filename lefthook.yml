# Pre-commit and pre-push hooks for Kumiki.
# Install: `pnpm install` (auto-runs `lefthook install` via the `prepare` script).
# See https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: format-non-svelte
      # oxfmt handles TS/JS/JSON/MD/YAML/etc.; .svelte stays on prettier
      # via prettier-plugin-svelte until oxfmt's bundled Svelte support
      # stabilizes (oxc-project/oxc#19715).
      glob: '*.{ts,svelte.ts,js,mjs,cjs,json,md,yml,yaml}'
      run: pnpm exec oxfmt --check {staged_files}
      stage_fixed: true
    - name: format-svelte
      glob: '*.svelte'
      run: pnpm exec prettier --check {staged_files}
      stage_fixed: true
    - name: lint
      glob: '*.{ts,svelte,svelte.ts}'
      run: pnpm exec oxlint {staged_files}
    - name: layering
      run: pnpm check:layering
    - name: locale-shape
      glob: 'packages/locale/**'
      run: pnpm check:locale-shape

pre-push:
  parallel: false
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: test
      run: pnpm test
    - name: health
      # publint / attw / agadoo / size-limit / layering / locale / jsdoc.
      run: pnpm ci:health
